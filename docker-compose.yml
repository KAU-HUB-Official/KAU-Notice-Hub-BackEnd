services:
  api:
    build:
      context: .
    environment:
      NOTICE_JSON_PATH: /data/kau_official_posts.json
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CONTENT_ENRICHMENT_ENABLED: ${CONTENT_ENRICHMENT_ENABLED:-false}
      CONTENT_ENRICHMENT_PROVIDER: ${CONTENT_ENRICHMENT_PROVIDER:-openai}
      CONTENT_ENRICHMENT_MODEL: ${CONTENT_ENRICHMENT_MODEL:-gpt-4.1-mini}
      CONTENT_ENRICHMENT_FALLBACK_MODEL: ${CONTENT_ENRICHMENT_FALLBACK_MODEL:-gpt-5.5}
      CONTENT_ENRICHMENT_IMAGE_DETAIL: ${CONTENT_ENRICHMENT_IMAGE_DETAIL:-high}
      CONTENT_ENRICHMENT_MIN_TEXT_LENGTH: ${CONTENT_ENRICHMENT_MIN_TEXT_LENGTH:-30}
      CONTENT_ENRICHMENT_MAX_ASSETS_PER_NOTICE: ${CONTENT_ENRICHMENT_MAX_ASSETS_PER_NOTICE:-3}
      CONTENT_ENRICHMENT_MAX_FILE_BYTES: ${CONTENT_ENRICHMENT_MAX_FILE_BYTES:-10485760}
      CONTENT_ENRICHMENT_MAX_CALLS_PER_RUN: ${CONTENT_ENRICHMENT_MAX_CALLS_PER_RUN:-50}
      CONTENT_ENRICHMENT_ALLOWED_DOMAINS: ${CONTENT_ENRICHMENT_ALLOWED_DOMAINS:-kau.ac.kr,career.kau.ac.kr,college.kau.ac.kr,research.kau.ac.kr,ibhak.kau.ac.kr,ctl.kau.ac.kr,lib.kau.ac.kr,ftc.kau.ac.kr,amtc.kau.ac.kr,fsc.kau.ac.kr,grad.kau.ac.kr,gradbus.kau.ac.kr,aisw.kau.ac.kr,lms.kau.ac.kr,asbt.kau.ac.kr}
      CRAWLER_SCHEDULER_ENABLED: ${CRAWLER_SCHEDULER_ENABLED:-true}
      CRAWLER_INTERVAL_SECONDS: ${CRAWLER_INTERVAL_SECONDS:-10800}
      CRAWLER_RUN_ON_STARTUP: ${CRAWLER_RUN_ON_STARTUP:-true}
      CRAWLER_MAX_PAGES: ${CRAWLER_MAX_PAGES:-0}
      CRAWLER_MIN_RECORDS: ${CRAWLER_MIN_RECORDS:-1}
      CRAWLER_MIN_RETAIN_RATIO: ${CRAWLER_MIN_RETAIN_RATIO:-0.5}
    volumes:
      - notice_data:/data
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped

  crawler:
    build:
      context: .
    profiles:
      - tools
    environment:
      NOTICE_JSON_PATH: /data/kau_official_posts.json
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CONTENT_ENRICHMENT_ENABLED: ${CONTENT_ENRICHMENT_ENABLED:-false}
      CONTENT_ENRICHMENT_PROVIDER: ${CONTENT_ENRICHMENT_PROVIDER:-openai}
      CONTENT_ENRICHMENT_MODEL: ${CONTENT_ENRICHMENT_MODEL:-gpt-4.1-mini}
      CONTENT_ENRICHMENT_FALLBACK_MODEL: ${CONTENT_ENRICHMENT_FALLBACK_MODEL:-gpt-5.5}
      CONTENT_ENRICHMENT_IMAGE_DETAIL: ${CONTENT_ENRICHMENT_IMAGE_DETAIL:-high}
      CONTENT_ENRICHMENT_MIN_TEXT_LENGTH: ${CONTENT_ENRICHMENT_MIN_TEXT_LENGTH:-30}
      CONTENT_ENRICHMENT_MAX_ASSETS_PER_NOTICE: ${CONTENT_ENRICHMENT_MAX_ASSETS_PER_NOTICE:-3}
      CONTENT_ENRICHMENT_MAX_FILE_BYTES: ${CONTENT_ENRICHMENT_MAX_FILE_BYTES:-10485760}
      CONTENT_ENRICHMENT_MAX_CALLS_PER_RUN: ${CONTENT_ENRICHMENT_MAX_CALLS_PER_RUN:-50}
      CONTENT_ENRICHMENT_ALLOWED_DOMAINS: ${CONTENT_ENRICHMENT_ALLOWED_DOMAINS:-kau.ac.kr,career.kau.ac.kr,college.kau.ac.kr,research.kau.ac.kr,ibhak.kau.ac.kr,ctl.kau.ac.kr,lib.kau.ac.kr,ftc.kau.ac.kr,amtc.kau.ac.kr,fsc.kau.ac.kr,grad.kau.ac.kr,gradbus.kau.ac.kr,aisw.kau.ac.kr,lms.kau.ac.kr,asbt.kau.ac.kr}
      CRAWLER_COMMAND: ${CRAWLER_COMMAND:-python3 -m app.crawler.main --output "$$CRAWLER_OUTPUT_PATH"}
      MIN_RECORDS: ${MIN_RECORDS:-1}
      MIN_RETAIN_RATIO: ${MIN_RETAIN_RATIO:-0.5}
    volumes:
      - notice_data:/data
    command: ["bash", "scripts/run_incremental_crawl_publish.sh"]

  caddy:
    image: caddy:2
    profiles:
      - proxy
    environment:
      API_DOMAIN: ${API_DOMAIN:-:80}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

volumes:
  notice_data:
  caddy_data:
  caddy_config:
